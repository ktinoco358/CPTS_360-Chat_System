<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi Chat</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Your CSS -->
<link rel="stylesheet" href="style.css">

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>


<div id="loginPage">
    <div class="TEMUCHAT_INFO">
        <h1>TEMU CHAT</h1>
        <h3>chat w/<br>friends<br>online</h3>
    </div>



    <div class="signInInfo"> 
        <h2>Login</h2>

        <div class="inputGroup">
            <input type="text" class="form-control" id="usernameInput" placeholder="Username">
            <input type="text" class="form-control" id="passwordInput" placeholder="Password">
            <button class="btn btn-primary" id="loginBtn">Login</button>
            <button class="btn btn-secondary" onclick="register()">Sign Up</button>
        </div>

        <div class="NewUserGroup">
            <p>Don't have an account? Sign Up</p>
        </div>
    </div>
</div>

      <div class="input-group">
        <input type="text" id="usernameInput" class="form-control" placeholder="Enter username">

<div id="chatSection" style="display: none;">

    <!--This is all done through bootstrap please dont remove comments if you use AI make sure to tell it to keep them -->
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-3 sidebar bg-light">
            <h5 class="p-3 border-bottom">Temu Chat <br>
                <small id="currentUserDisplay"> </small>
            </h5>
            <!-- Users -->
            <div class="p-2 border-top">
                <strong>Select Users To Chat With!</strong>
                <ul class="list-group" id="userList"></ul>
            </div>
            <!-- Chats -->
            <div class="p-2">
                <strong>Chats</strong>
                <ul class="list-group mb-3" id="chatList">
                    <li class="list-group-item active" data-name="Global Chat">
                        Global Chat
                    </li>
                </ul>
            </div>

        </div>

        <!-- Chat Area -->
        <div class="col-9 chat-area">

            <!-- Header -->
            <div class="p-3 border-bottom bg-white">

            <h5 id="chatHeader">Global Chat</h5>
            <small id="typingIndicator" class="text-muted"></small>

            </div>

            <!-- Messages -->
            <div class="messages" id="messages"></div>

            <!-- Input -->
            <div class="p-3 border-top bg-white">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
                    <button class="btn btn-primary" id="sendBtn">Send</button>
                </div>
            </div>

        </div>
    </div>
</div>
</div>

<!-- Your JS -->
<script src="style.js"></script>

</body>
</html>
