<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi Chat</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Your CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginSection" class="container mt-3">
  <div class="row justify-content-center">
    <div class="col-6">
      <h4 class="mb-3">Login</h4>
      <div class="input-group">
        <input type="text" id="usernameInput" class="form-control" placeholder="Enter username">
        <button class="btn btn-primary" id="loginBtn">Login</button>
      </div>
    </div>
  </div>
</div>

<div id="chatSection" style="display: none;">

    <!--This is all done through bootstrap please dont remove comments if you use AI make sure to tell it to keep them -->
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-3 sidebar bg-light">
            <h5 class="p-3 border-bottom">Temu Chat</h5>
            <ul class="list-group list-group-flush" id="chatList">
                <li class="list-group-item active" data-name="Andres">Andres</li>
                <li class="list-group-item" data-name="Karen">Karen</li>
                <li class="list-group-item" data-name="Arni">Arni</li>
            </ul>
        </div>

        <!-- Chat Area -->
        <div class="col-9 chat-area">

            <!-- Header -->
            <div class="p-3 border-bottom bg-white">

            <h5 id="chatHeader">Andres</h5>
            <small id="typingIndicator" class="text-muted"></small>

            </div>

            <!-- Messages -->
            <div class="messages" id="messages"></div>

            <!-- Input -->
            <div class="p-3 border-top bg-white">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
                    <button class="btn btn-primary" id="sendBtn">Send</button>
                </div>
            </div>

        </div>
    </div>
</div>
</div>
<!-- Your JS -->
<script src="style.js"></script>

</body>
</html>
