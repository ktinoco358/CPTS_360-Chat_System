<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi Chat</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Your CSS -->
<link rel="stylesheet" href="style.css">

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=McLaren&display=swap" rel="stylesheet">

</head>

<body>


<div id="loginPage">
    <div class="TEMUCHAT_INFO">
        <h1>TEMU CHAT</h1>
        <h3>
             chat w/<br>
             friends<br>
            <img src="assets/img/logo2.png" class="inline-img">
            online</h3>
    </div>



    <div class="signInInfo"  id="authBox"> 
        <h2 id="formTitle">Login</h2>

        <div class="inputGroup">
            <input type="text" class="form-control" id="usernameInput" placeholder="Username">
            <input type="password" class="form-control" id="passwordInput" placeholder="Password">
            
            <button class="btn btn-primary" id="loginBtn">Login</button>
            <button class="btn btn-success" id="registerBtn" style="display:none;">Sign Up</button>

        </div>


        <div class="NewUserGroup">
            <p>
                <span id="toggleText">Don't have an account?</span>
                <button class="btn btn-link p-0" id="toggleBtn">Sign Up</button>
              </p>
        </div>

    </div>

</div>

<div id="chatSection" style="display: none;">

    <!--This is all done through bootstrap please dont remove comments if you use AI make sure to tell it to keep them -->
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-3 sidebar sidebarScheme">
            <h5 class="p-3">

            <img src="assets/img/logo2.png" class="inline-img">
            
            Temu Chat <br>
                <small id="currentUserDisplay"> </small>
            </h5>
            <!-- Users -->
            <div class="p-2">
                <strong>Active Users</strong>
                <ul class="list-group" id="userList"></ul>
            </div>
            <!-- Chats -->
            <div class="p-2">
                <strong>Chats</strong>
                <ul class="list-group mb-3" id="chatList">
                    <li class="list-group-item active" data-name="Global Chat">
                        Global Chat
                    </li>
                </ul>
            </div>

        </div>

        <!-- Chat Area -->
        <div class="col-9 chat-area">

            <!-- Header -->
            <div class="p-3 inputAreaScheme">

            <h5 id="chatHeader"></h5>
            <small id="typingIndicator" class="text-muted"></small>

            </div>

            <!-- Messages -->
            <div class="messages" id="messages"></div>

            <!-- Input -->
            <div class="p-3 inputAreaScheme">
                <div class="input-group">
                    <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
                    <button class="btn btn-primary" id="sendBtn">Send</button>
                </div>
            </div>

        </div>
    </div>
</div>
</div>

<!-- Your JS -->
<script src="style.js"></script>

</body>
</html>
